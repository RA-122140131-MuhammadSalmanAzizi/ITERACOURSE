<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITERA Course - E-Learning Platform</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Anti-Inspect Element & DevTools
      document.addEventListener('contextmenu', event => event.preventDefault()); // Block right click
      document.addEventListener('keydown', function(e) {
        // Block F12
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
        }
        // Block Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Element Inspector)
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) {
          e.preventDefault();
        }
        // Block Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
        }
      });
      // Anti-Debugger loop (creates infinite loop if devtools is open)
      setInterval(function() {
        var start = new Date();
        debugger;
        var end = new Date();
        if (end - start > 100) {
           document.body.innerHTML = "<h1 style='text-align:center;margin-top:20vh;font-family:sans-serif;'>Access Denied. DevTools is disabled.</h1>";
        }
      }, 1000);
    </script>
  </body>
</html>
